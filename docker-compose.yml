services:
  postgres:
    image: postgres:16-alpine
    container_name: factoryos-db
    environment:
      POSTGRES_DB: factoryos
      POSTGRES_USER: factoryos
      POSTGRES_PASSWORD: factoryos123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
